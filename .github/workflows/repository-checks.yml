name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    name: integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Enforce repository publication policy
        run: python .github/scripts/check_repository_policy.py --source HEAD

      - name: Validate reconstructed version lineage
        run: python scripts/python/version_lineage.py validate --strict

      - name: Check generated lineage documentation
        run: python scripts/python/version_lineage.py build-docs --check

      - name: Run lineage unit tests
        run: python -m unittest discover -s tests -p "test_version_lineage.py"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Parse R source files
        shell: Rscript {0}
        run: |
          files <- list.files("scripts/R", pattern = "[.]R$", recursive = TRUE, full.names = TRUE)
          for (file in files) parse(file = file, encoding = "UTF-8")
          message("Parsed ", length(files), " R files")
